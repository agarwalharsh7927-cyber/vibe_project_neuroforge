<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NeuroForg</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050b14;
            --accent: #6ee7f9;
            --primary: #38bdf8;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg);
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .auth-header { text-align: center; margin-bottom: 32px; }
        .auth-header h1 { font-size: 1.75rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .auth-header p { color: #a1b8d1; font-size: 0.9rem; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.8rem; font-weight: 600; color: #a1b8d1; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); font-size: 1.1rem; }
        
        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        
        .form-group input:focus { 
            border-color: var(--accent); 
            background: rgba(255, 255, 255, 0.08); 
            outline: none; 
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #03131a;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }
        
        .btn-auth:hover { background: var(--accent); transform: translateY(-1px); }

        .auth-footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: #a1b8d1; }
        .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }

        .hidden { display: none; }

        .toast {
            position: fixed;
            top: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            background: var(--primary);
            color: #03131a;
            font-weight: 600;
            transform: translateY(-100px);
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .toast.active { transform: translateY(0); }
    </style>
</head>
<body class="dark-theme">
    <div class="bg-3d"></div>
    <div id="toast" class="toast">Success! Redirecting...</div>

    <div style="position: absolute; top: 20px; left: 20px; z-index: 10;">
        <a href="intro.html" style="color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.9rem;">
            <i class='bx bx-left-arrow-alt' style="font-size: 1.2rem;"></i> Back to Home
        </a>
    </div>

    <div class="auth-container" id="login-container">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Log in to your studio workspace</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class='bx bx-envelope'></i>
                    <input type="email" id="login-email" required placeholder="name@email.com" value="admin@neuroforg.io">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="login-password" required placeholder="••••••••" value="admin123">
                </div>
            </div>
            <button type="submit" class="btn-auth">Sign In</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="#" id="show-register">Create Account</a>
        </div>
    </div>

    <div class="auth-container hidden" id="register-container">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join the NeuroForg studio community</p>
        </div>
        <form id="register-form">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class='bx bx-user'></i>
                    <input type="text" id="reg-name" required placeholder="John Doe">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class='bx bx-envelope'></i>
                    <input type="email" id="reg-email" required placeholder="name@email.com">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="reg-password" required placeholder="Create a password">
                </div>
            </div>
            <button type="submit" class="btn-auth">Register</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="#" id="show-login">Sign In</a>
        </div>
    </div>

    <script>
        const loginContainer = document.getElementById('login-container');
        const registerContainer = document.getElementById('register-container');
        const showRegister = document.getElementById('show-register');
        const showLogin = document.getElementById('show-login');
        const toast = document.getElementById('toast');

        showRegister.addEventListener('click', (e) => {
            e.preventDefault();
            loginContainer.classList.add('hidden');
            registerContainer.classList.remove('hidden');
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            registerContainer.classList.add('hidden');
            loginContainer.classList.remove('hidden');
        });

        const handleAuth = (e) => {
            e.preventDefault();
            localStorage.setItem('builder_is_authenticated', 'true');
            toast.classList.add('active');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        };

        document.getElementById('login-form').addEventListener('submit', handleAuth);
        document.getElementById('register-form').addEventListener('submit', handleAuth);
    </script>
    <script src="js/utils.js"></script>
</body>
</html>
